<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fire - Rede Social (Modo Admin)</title>
    <style>
        :root {
            --fire-grad: linear-gradient(135deg, #ff4500 0%, #ff8c00 100%);
            --dark-bg: #0f0f0f;
            --card-bg: #1e1e1e;
        }

        body {
            background-color: var(--dark-bg);
            color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            width: 100%;
            background: var(--fire-grad);
            padding: 20px 0;
            text-align: center;
            box-shadow: 0 4px 20px rgba(255, 69, 0, 0.4);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .container {
            width: 90%;
            max-width: 600px;
            margin-top: 30px;
        }

        .post-form, .post {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin-bottom: 20px;
            position: relative;
        }

        textarea {
            width: 100%;
            height: 100px;
            background: #2d2d2d;
            border: 1px solid #444;
            border-radius: 10px;
            color: white;
            padding: 15px;
            font-size: 1rem;
            resize: none;
            box-sizing: border-box;
            outline: none;
        }

        button {
            width: 100%;
            background: var(--fire-grad);
            color: white;
            border: none;
            padding: 12px;
            margin-top: 10px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover { opacity: 0.9; transform: scale(1.02); }

        .post { border-left: 5px solid #ff4500; }

        .post-date { font-size: 0.8rem; color: #888; margin-bottom: 10px; }

        /* Botão de Apagar (Só aparece para Admin) */
        .btn-delete {
            background: #ff0000;
            width: auto;
            padding: 5px 10px;
            font-size: 0.8rem;
            position: absolute;
            top: 10px;
            right: 10px;
            display: none; /* Escondido por padrão */
        }

        /* Botão Flutuante de Login */
        #adminLoginBtn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #333;
            color: white;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.2rem;
            border: 2px solid #ff4500;
        }

        .admin-active .btn-delete { display: block; }
        .admin-badge {
            background: gold;
            color: black;
            padding: 2px 8px;
            border-radius: 5px;
            font-size: 0.7rem;
            font-weight: bold;
            margin-left: 10px;
            display: none;
        }
    </style>
</head>
<body>

    <header>
        <h1>🔥 FIRE <span id="adminBadge" class="admin-badge">MODO ADM</span></h1>
    </header>

    <div class="container">
        <div class="post-form">
            <textarea id="postInput" placeholder="O que está queimando na sua mente?"></textarea>
            <button onclick="publishPost()">Publicar na Brasa</button>
        </div>

        <div id="feed"></div>
    </div>

    <div id="adminLoginBtn" onclick="loginAdmin()">🔒</div>

    <script>
        let isAdmin = false;

        // Carregar posts
        window.onload = () => {
            renderFeed();
        };

        function loginAdmin() {
            if (isAdmin) {
                isAdmin = false;
                document.body.classList.remove('admin-active');
                document.getElementById('adminBadge').style.display = 'none';
                alert("Saiu do modo Admin");
            } else {
                const pass = prompt("Senha do Admin:");
                if (pass === 'fogo123') { // Mude a senha aqui
                    isAdmin = true;
                    document.body.classList.add('admin-active');
                    document.getElementById('adminBadge').style.display = 'inline';
                    alert("Acesso total liberado!");
                } else {
                    alert("Senha incorreta!");
                }
            }
            renderFeed(); // Re-renderiza para mostrar/esconder botões
        }

        function publishPost() {
            const input = document.getElementById('postInput');
            if (!input.value.trim()) return;

            const posts = JSON.parse(localStorage.getItem('fire_posts') || '[]');
            posts.unshift({
                id: Date.now(),
                content: input.value,
                date: new Date().toLocaleString()
            });

            localStorage.setItem('fire_posts', JSON.stringify(posts));
            input.value = '';
            renderFeed();
        }

        function deletePost(id) {
            if (confirm("Deseja apagar este rastro de fogo?")) {
                let posts = JSON.parse(localStorage.getItem('fire_posts') || '[]');
                posts = posts.filter(p => p.id !== id);
                localStorage.setItem('fire_posts', JSON.stringify(posts));
                renderFeed();
            }
        }

        function renderFeed() {
            const feed = document.getElementById('feed');
            const posts = JSON.parse(localStorage.getItem('fire_posts') || '[]');
            feed.innerHTML = '';

            posts.forEach(post => {
                const div = document.createElement('div');
                div.className = 'post';
                div.innerHTML = `
                    <div class="post-date">${post.date}</div>
                    <div class="post-content">${post.content}</div>
                    <button class="btn-delete" onclick="deletePost(${post.id})">APAGAR</button>
                `;
                feed.appendChild(div);
            });
        }
    </script>
</body>
</html>
